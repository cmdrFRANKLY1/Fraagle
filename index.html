<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraagle Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Immediately inject correct theme class before body renders to avoid flashing
        (function() {
            const userTheme = localStorage.getItem('theme') || 'dark';
            if (userTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        // Tailwind configuration for advanced modern styling in both modes
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#09090b', // Deep zinc dark background
                        darkCard: '#18181b', // Dark card
                        darkBorder: '#27272a', // Subtle dark borders
                        lightBg: '#f8f9fa', // Pristine soft off-white background
                        lightCard: '#ffffff', // Clean white card
                        lightBorder: '#e2e8f0', // Crisp slate border
                        fraagleBlue: '#3b82f6',
                        fraagleRed: '#ef4444',
                        fraagleYellow: '#f59e0b',
                        fraagleGreen: '#10b981'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Custom smooth scrollbar for premium look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.25);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.45);
        }
    </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-zinc-800 dark:text-zinc-100 min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <!-- Decorative Ambient Soft Glow Gradients (Adapts beautifully to both Light & Dark modes) -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-500/10 dark:bg-blue-500/10 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-500/10 dark:bg-purple-500/10 blur-[120px] pointer-events-none"></div>

    <!-- Top Navigation Bar -->
    <header class="flex items-center justify-between p-5 relative z-10">
        <!-- Left Side: Mini Brand Indicator -->
        <div class="flex items-center space-x-2">
            <span class="text-lg font-bold tracking-tight select-none bg-gradient-to-r from-blue-500 to-indigo-500 bg-clip-text text-transparent">F.</span>
        </div>

        <!-- Right Side: Dark Mode Toggle and App Launcher -->
        <div class="flex items-center space-x-2 sm:space-x-3">
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="p-2.5 rounded-xl border border-lightBorder dark:border-darkBorder bg-white/70 dark:bg-darkCard/50 backdrop-blur-md hover:bg-white dark:hover:bg-darkCard transition-all duration-200 focus:outline-none shadow-sm dark:shadow-none flex items-center justify-center cursor-pointer" aria-label="Toggle Theme">
                <!-- Sun Icon (visible in dark mode to switch to light) -->
                <svg id="theme-toggle-sun-icon" class="hidden w-5 h-5 text-yellow-500 dark:text-yellow-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 11H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
                <!-- Moon Icon (visible in light mode to switch to dark) -->
                <svg id="theme-toggle-moon-icon" class="hidden w-5 h-5 text-indigo-600 dark:text-indigo-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>

            <!-- Workspace Workspace Apps Launcher Icon (9-Dot Menu) -->
            <div class="relative">
                <button id="app-launcher-btn" class="hidden p-2.5 rounded-xl border border-lightBorder dark:border-darkBorder bg-white/70 dark:bg-darkCard/50 backdrop-blur-md hover:bg-white dark:hover:bg-darkCard transition-all duration-200 focus:outline-none shadow-sm dark:shadow-none flex items-center justify-center cursor-pointer" aria-label="Apps Menu">
                    <svg class="w-5 h-5 text-zinc-600 dark:text-zinc-300 pointer-events-none" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 12c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </button>

                <!-- Workspace Apps Dropdown Menu -->
                <div id="app-launcher-dropdown" class="hidden absolute right-0 mt-3 w-80 max-h-[420px] overflow-y-auto bg-white/95 dark:bg-darkCard/90 border border-lightBorder dark:border-darkBorder rounded-2xl shadow-2xl p-4 z-50 transition-all duration-200 transform scale-95 opacity-0 origin-top-right backdrop-blur-xl">
                    <div class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 mb-3 px-2 uppercase tracking-wider">Quick Launcher</div>
                    <div id="dropdown-apps-grid" class="grid grid-cols-3 gap-2">
                        <!-- Populated dynamically with the apps -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->

                <span class="text-fraagleGreen">g</span>

        <!-- Sleek Search Box Wrapper with Ambient Shadows -->
        <div class="w-full max-w-[584px] mb-8 relative group" id="search-container">
            <div class="flex items-center w-full h-[52px] px-5 rounded-2xl border border-lightBorder dark:border-darkBorder bg-white/90 dark:bg-darkCard/70 backdrop-blur-md focus-within:bg-white dark:focus-within:bg-darkCard/90 shadow-sm hover:shadow-xl hover:shadow-indigo-500/5 focus-within:shadow-xl focus-within:shadow-indigo-500/10 focus-within:border-indigo-500/50 dark:focus-within:border-indigo-400/50 transition-all duration-300">
                <!-- Search Icon -->
                <svg class="w-5 h-5 text-zinc-400 mr-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                </svg>
                
                <!-- Search Input Field -->

                    type="text"

                <!-- Clear Search Button -->
                <button id="clear-search" class="hidden p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-400 focus:outline-none mr-2">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>

                <!-- Voice Mic Icon -->
                <svg class="w-5 h-5 text-zinc-400 dark:text-zinc-500 hover:text-indigo-600 dark:hover:text-indigo-400 cursor-pointer hidden sm:block transition" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>

            <!-- Autocomplete Search Results Dropdown -->

                <div id="dropdown-results-container" class="py-2">

        <!-- Google-Style Search Results Dashboard (Hidden by default) -->

                <span class="text-xs uppercase font-semibold tracking-wider text-zinc-500 dark:text-zinc-400 select-none">Official Battlestate Games Channels</span>
                <div class="flex items-center space-x-5 text-zinc-500 dark:text-zinc-400">

                        <svg class="w-4.5 h-4.5" fill="currentColor" viewBox="0 0 24 24">

                    <!-- YouTube -->
                    <a href="https://www.youtube.com/battlestategames" target="_blank" title="BSG YouTube" class="hover:text-red-500 transition-colors">

                        </svg>
                    </a>
                    <!-- Twitter / X -->
                    <a href="https://twitter.com/bstategames" target="_blank" title="BSG Twitter" class="hover:text-sky-500 dark:hover:text-zinc-100 transition-colors">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M18.244 2.25h3.308l-7.227 7.56 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.085L1.254 2.25h6.8l4.8 6.35 5.39-6.35zM15.902 19.77h1.832L7.284 4.59H5.318L15.902 19.77z"/>

                            <path d="M24 11.5c0-1.65-1.35-3-3-3-.96 0-1.86.48-2.42 1.24-1.64-1-3.85-1.64-6.29-1.72l1.35-4.24 3.71.79c.04.97.86 1.75 1.86 1.75 1.02 0 1.85-.83 1.85-1.85s-.83-1.85-1.85-1.85c-.86 0-1.58.59-1.78 1.39l-4.14-.88c-.22-.05-.44.08-.51.29l-1.62 5.09c-2.47.04-4.71.69-6.39 1.71C4.41 8.99 3.5 8.5 2.5 8.5c-1.65 0-3 1.35-3 3 0 1.13.56 2.11 1.41 2.69-.06.26-.09.53-.09.81 0 3.86 4.43 7 9.88 7 5.46 0 9.88-3.14 9.88-7 0-.28-.03-.55-.09-.8.82-.57 1.38-1.55 1.38-2.69zM5.5 13.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm11.5 4.5c-1.84 1.84-5.16 1.84-7 0-.19-.19-.19-.51 0-.7.19-.19.51-.19.7 0 1.46 1.46 4.14 1.46 5.6 0 .19-.19.51-.19.7 0 .19.2.19.51 0 .7zm-1.5-6c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>

            <div class="text-xs text-zinc-400 dark:text-zinc-500 mb-6 flex items-center justify-between">
                <span id="results-meta-text">About 0 results (0.00 seconds)</span>
                <button id="results-close-btn" class="text-indigo-600 dark:text-indigo-400 hover:underline font-semibold">Clear Search</button>
            </div>
            <div id="google-results-container" class="space-y-6">
                <!-- Search entries populate here dynamically -->
            </div>
        </div>

        <!-- Default Shortcuts Presentation Grid wrapped in a container that can be hidden -->
        <div id="apps-section" class="hidden w-full max-w-4xl px-4 mb-8">
            <!-- Dynamic Grid Target -->
            <div id="apps-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-5 justify-center">
                <!-- Apps will render dynamically here -->
            </div>

            <!-- Empty / No Results State -->
            <div id="no-results" class="hidden text-center py-8">
                <p class="text-zinc-500 dark:text-zinc-400">No matching apps found.</p>
            </div>
        </div>

        <!-- Dynamic Registry / Setup Warning Alert (Informational) -->
        <div id="setup-warning" class="hidden mt-6 mb-8 p-4 max-w-xl rounded-2xl border border-yellow-500/10 bg-yellow-500/5 text-xs text-yellow-600 dark:text-yellow-400 backdrop-blur-md">
            <div class="flex items-start">
                <svg class="w-5 h-5 mr-2.5 flex-shrink-0 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
                </svg>
                <div>
                    <span class="font-bold">Displaying Local Fallback list.</span> For production, write a <code>generate-list.js</code> build script in Vercel to auto-output <code>public/app-list.json</code> containing your HTML array!
                </div>
            </div>

    </main>

    <!-- Floating Hover Detail Preview Card (translucent glass design) -->
    <div id="hover-preview-card" class="hidden absolute pointer-events-none z-50 bg-white/95 dark:bg-darkCard/95 border border-lightBorder dark:border-darkBorder rounded-2xl p-4 shadow-2xl max-w-sm w-72 backdrop-blur-xl transition-all duration-150 transform scale-100">
        <!-- Loading spinner templates or populated content rendering -->
    </div>

    <script>
        // --- 1. THEME TOGGLING ENGINE ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('theme-toggle-sun-icon');
        const moonIcon = document.getElementById('theme-toggle-moon-icon');

        function applyTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        // Initialize theme on load based on saved setting or fallback
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme === 'dark');

        // Listen for user click interaction
        themeToggleBtn.addEventListener('click', () => {
            const isCurrentlyDark = document.documentElement.classList.contains('dark');
            const nextTheme = isCurrentlyDark ? 'light' : 'dark';
            localStorage.setItem('theme', nextTheme);
            applyTheme(nextTheme === 'dark');
        });


        // --- 2. EXTENSIBLE UNIFIED SEARCH INDEX SYSTEM ---
        let searchIndex = [];
        let currentlyFilteredApps = []; // For bottom grid view
        let localAppsRawList = [];      // Raw copy of dashboard apps

        // Default local fallback dashboard apps if app-list.json is missing
        const fallbackAppsList = [
            "analytics.html",
            "dashboard.html",
            "editor.html",
            "notes.html",
            "calculator.html",
            "game.html",
            "settings.html",
            "tasks.html"
        ];

        // Modern, premium light/dark dynamic pastel gradients for icons
        const iconGradients = [
            "from-blue-500/10 to-indigo-600/20 dark:from-blue-500/20 dark:to-indigo-600/40 border-blue-500/20 dark:border-blue-500/30 text-blue-600 dark:text-blue-400",
            "from-rose-500/10 to-red-600/20 dark:from-rose-500/20 dark:to-red-600/40 border-rose-500/20 dark:border-rose-500/30 text-rose-600 dark:text-rose-400",
            "from-amber-500/10 to-yellow-600/20 dark:from-amber-500/20 dark:to-yellow-600/40 border-amber-500/20 dark:border-amber-500/30 text-amber-600 dark:text-amber-400",
            "from-emerald-500/10 to-teal-600/20 dark:from-emerald-500/20 dark:to-teal-600/40 border-emerald-500/20 dark:border-emerald-500/30 text-emerald-600 dark:text-emerald-400",
            "from-violet-500/10 to-purple-600/20 dark:from-violet-500/20 dark:to-purple-600/40 border-violet-500/20 dark:border-violet-500/30 text-violet-600 dark:text-violet-400",
            "from-cyan-500/10 to-blue-600/20 dark:from-cyan-500/20 dark:to-blue-600/40 border-cyan-500/20 dark:border-cyan-500/30 text-cyan-600 dark:text-cyan-400",
            "from-fuchsia-500/10 to-pink-600/20 dark:from-fuchsia-500/20 dark:to-pink-600/40 border-fuchsia-500/20 dark:border-fuchsia-500/30 text-fuchsia-600 dark:text-fuchsia-400"
        ];

        function getAppTitle(fileName) {
            return fileName
                .replace('.html', '')
                .split(/[-_]/)
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }

        function updateUIVisibility() {
            const appsSection = document.getElementById('apps-section');
            const appLauncherBtn = document.getElementById('app-launcher-btn');

            if (localAppsRawList.length === 0) {
                appsSection.classList.add('hidden');
                appLauncherBtn.classList.add('hidden');
            } else {
                appsSection.classList.remove('hidden');
                appLauncherBtn.classList.remove('hidden');
            }
        }

        // Helper to fetch directly from Tarkov GraphQL with global error shielding
        async function fetchTarkovGraphQL(query) {
            try {
                const response = await fetch('https://api.tarkov.dev/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                if (!response.ok) return null;
                const json = await response.json();
                if (json.errors && json.errors.length > 0) {
                    console.warn("GraphQL reported error logs:", json.errors);
                }
                return json.data;
            } catch (err) {
                console.error("Direct GraphQL request failed:", err);
                return null;
            }
        }

        // --- LOAD CORES ---
        async function initializeHubData() {
            // 1. Fetch Local Dashboard apps
            try {
                const res = await fetch('/app-list.json');
                if (!res.ok) throw new Error();
                localAppsRawList = await res.json();
            } catch (err) {
                const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                if (isLocalhost) {
                    document.getElementById('setup-warning').classList.remove('hidden');
                    localAppsRawList = fallbackAppsList;
                } else {
                    localAppsRawList = [];
                }
            }

            // Append Local Apps to the Unified Search Index
            localAppsRawList.forEach(app => {
                const title = getAppTitle(app);
                searchIndex.push({
                    id: `app-${app}`,
                    title: title,
                    type: 'app',
                    url: `/apps/${app}`,
                    description: `Launch local workspace application: ${title}. Run locally at Fraagle Hub directory, clean custom HTML logic.`,
                    category: 'Workspace App'
                });
            });

            // Set default grid lists
            currentlyFilteredApps = [...localAppsRawList];
            updateUIVisibility();
            renderApps(localAppsRawList);
            renderLauncherDropdown(localAppsRawList);

            // 2. Load Tarkov Dev Cached Data (Ingested safely in isolated steps)
            loadTarkovItems();
        }

        async function loadTarkovItems() {
            let items = [];
            let traders = [];
            let tasks = [];

            // Step 1: Ingest items either via the Vercel proxy api endpoint or fallback directly
            try {
                const response = await fetch('/api/tarkov-data');
                if (response.ok) {
                    const json = await response.json();
                    items = json?.data?.pvp || [];
                    console.log("Loaded Tarkov items from proxy endpoint:", items.length);
                } else {
                    throw new Error("Proxy response failed");
                }
            } catch (e) {
                console.log("Proxy endpoint is offline or unavailable. Directing fallback query...");
                const fallbackItemsQuery = `query {
                    pvp: items(lang: en, gameMode: regular) {
                        id name shortName wikiLink iconLink basePrice weight avg24hPrice category { name }
                        properties { __typename
                            ... on ItemPropertiesWeapon { caliber fireRate }
                            ... on ItemPropertiesArmor { class durability }
                        }
                    }
                }`;
                const data = await fetchTarkovGraphQL(fallbackItemsQuery);
                items = data?.pvp || [];
                console.log("Loaded items directly from tarkov.dev:", items.length);
            }

            // Step 2: Safely ingest traders in an isolated background request
            try {
                const fallbackTradersQuery = `query {
                    traders(lang: en) {
                        id name imageLink wikiLink description
                    }
                }`;
                const data = await fetchTarkovGraphQL(fallbackTradersQuery);
                traders = data?.traders || [];
                console.log("Loaded traders directly:", traders.length);
            } catch (e) {
                console.warn("Failed to load traders background query safely.");

            // Step 3: Safely ingest quests in an isolated background request
            try {
                const fallbackQuestsQuery = `query {
                    tasks(lang: en) {
                        id name wikiLink minPlayerLevel trader { name }
                    }
                }`;
                const data = await fetchTarkovGraphQL(fallbackQuestsQuery);
                tasks = data?.tasks || [];
                console.log("Loaded quests directly:", tasks.length);
            } catch (e) {
                console.warn("Failed to load quests background query safely.");
            }

            // Step 4: Add mapped items to Search Index safely

                items.filter(Boolean).forEach(item => {
                    const itemName = item.name || 'Unknown Item';
                    let statsSnippet = `${item.category?.name || 'Tarkov Equipment'}. Base price: ${item.basePrice || 0} ₽.`;
                    
                    if (item.properties) {
                        if (item.properties.__typename === 'ItemPropertiesWeapon') {
                            statsSnippet += ` Caliber: ${item.properties.caliber || 'N/A'}, Fire Rate: ${item.properties.fireRate || 'N/A'} RPM.`;
                        } else if (item.properties.__typename === 'ItemPropertiesArmor') {
                            statsSnippet += ` Armor Class: ${item.properties.class || 'N/A'}, Durability: ${item.properties.durability || 'N/A'}.`;

                    searchIndex.push({

                        url: item.wikiLink || `https://escapefromtarkov.fandom.com/wiki/Special:Search?search=${encodeURIComponent(itemName)}`,

            // Step 6: Add mapped quests to Search Index safely

        // Triggers and formats Google style search results
        function executeSearch(queryText) {
            dropdownResults.classList.add('hidden');
            cancelHoverPreview();
            
            const normalizedQuery = queryText.toLowerCase().trim();
            if (normalizedQuery.length === 0) {
                dismissGoogleSearchResults();
                return;
            }

            const startTime = performance.now();

            // Query index safely for matches
            const matches = searchIndex.filter(item => {
                const title = (item?.title || '').toLowerCase();
                const category = (item?.category || '').toLowerCase();
                return title.includes(normalizedQuery) || category.includes(normalizedQuery);
            });

            const endTime = performance.now();
            const processTime = ((endTime - startTime) / 1000).toFixed(3);

            // Populate Results Dashboard meta
            resultsMetaText.textContent = `About ${matches.length} results (${processTime} seconds)`;

            // Display / Hide containers
            appsSection.classList.add('hidden');
            googleResultsView.classList.remove('hidden');

            // Determine if search matches Tarkov-related parameters to show BSG channels
            const hasTarkovResults = matches.some(item => 
                item && (item.type === 'tarkov' || item.type === 'trader' || item.type === 'quest')
            );

            if (hasTarkovResults) {
                bsgChannelsBar.classList.remove('hidden');
            } else {
                bsgChannelsBar.classList.add('hidden');
            }

            // Render Google-style link layouts
            googleResultsContainer.innerHTML = '';
            
            if (matches.length === 0) {
                googleResultsContainer.innerHTML = `

                // Generate authentic Google breadcrumb pathing

            const query = searchInput.value.toLowerCase().trim();

                // Show default loaded applications if nothing is written yet
                const defaultSuggestions = searchIndex.filter(item => item && item.type === 'app');

        // Listen for input changes in the search input
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();

            }

            // Filter globally safely
            matchedResultsBuffer = searchIndex.filter(item => {
                const title = (item?.title || '').toLowerCase();
                const category = (item?.category || '').toLowerCase();
                return title.includes(query) || category.includes(query);
            });

            // Update local apps matching in parallel
            currentlyFilteredApps = localAppsRawList.filter(app => {
                const title = getAppTitle(app).toLowerCase();
                return title.includes(query) || app.toLowerCase().includes(query);
            });
            renderApps(currentlyFilteredApps);

            // Populate autocomplete suggestions
            renderAutocompleteDropdown(matchedResultsBuffer, true);
        });

        // Clear Search action button inside the searchbar
        clearBtn.addEventListener('click', dismissGoogleSearchResults);

        // Launch full search layout when pressing 'Enter' key
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                executeSearch(searchInput.value);
            }
        });

        // Close dropdown when clicking outside search system
        document.addEventListener('click', (e) => {
            const searchContainer = document.getElementById('search-container');
            if (!searchContainer.contains(e.target)) {
                dropdownResults.classList.add('hidden');
            }
        });

        // Global key shortcut commands
        window.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                if (document.activeElement === searchInput) {
                    searchInput.blur();
                }
                dropdownResults.classList.add('hidden');
                cancelHoverPreview();
            }
        });
    </script>
</body>
</html>
