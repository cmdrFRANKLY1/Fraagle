<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraagle Apps - Tarkov Keybinds</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <script>
        // Immediately inject correct theme class before body renders to avoid flashing
        (function() {
            const userTheme = localStorage.getItem('theme') || 'dark';
            if (userTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        // Tailwind configuration for advanced modern styling in both modes
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#09090b', // Deep zinc dark background
                        darkCard: '#18181b', // Dark card
                        darkBorder: '#27272a', // Subtle dark borders
                        lightBg: '#f8f9fa', // Pristine soft off-white background
                        lightCard: '#ffffff', // Clean white card
                        lightBorder: '#e2e8f0', // Crisp slate border
                        fraagleBlue: '#3b82f6',
                        fraagleRed: '#ef4444',
                        fraagleYellow: '#f59e0b',
                        fraagleGreen: '#10b981'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        h1, .header-title {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Custom smooth scrollbar for premium look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.25);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.45);
        }
        /* Custom transitions */
        .keyboard-key {
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-zinc-800 dark:text-zinc-100 min-h-screen flex flex-col justify-between relative overflow-x-hidden p-6 select-none">

    <!-- Interactive Permission & Sync Request Overlay Screen -->
    <div id="permission-screen" class="fixed inset-0 bg-lightBg/95 dark:bg-darkBg/95 z-50 flex flex-col items-center justify-center transition-all duration-500 ease-in-out">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-500/10 dark:bg-blue-500/10 blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-500/10 dark:bg-purple-500/10 blur-[120px] pointer-events-none"></div>
        
        <div class="relative z-10 w-full max-w-lg mx-4 p-6 bg-white dark:bg-darkCard border border-lightBorder dark:border-darkBorder rounded-3xl shadow-2xl backdrop-blur-md flex flex-col gap-5 text-center animate-fade-in">
            <div class="text-5xl filter drop-shadow-md select-none animate-bounce" style="animation-duration: 3s">🔑</div>
            <div>
                <h2 class="text-xl font-bold tracking-tight text-zinc-950 dark:text-zinc-100 uppercase">Tarkov Settings Sync</h2>
                <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-1 leading-relaxed max-w-sm mx-auto font-medium">
                    Fraagle Apps request permission to load and visualize your Escape from Tarkov controls profile.
                </p>
            </div>

            <!-- File Upload Dropzone -->
            <label id="drop-zone" class="border-2 border-dashed border-lightBorder dark:border-darkBorder hover:border-indigo-500 dark:hover:border-indigo-400 rounded-2xl p-8 flex flex-col items-center justify-center gap-2 cursor-pointer transition-colors bg-zinc-50/50 dark:bg-zinc-900/10" title="Select your Control.ini file">
                <input type="file" id="file-input" accept=".ini" class="hidden" />
                <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                </svg>
                <div class="text-xs font-bold text-zinc-700 dark:text-zinc-300 uppercase">Select Control.ini File</div>
                <div class="text-[10px] text-zinc-400 dark:
