<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraagle Apps - Twitch Live Check</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <script>
        (function() {
            const userTheme = localStorage.getItem('theme') || 'dark';
            if (userTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#09090b',
                        darkCard: '#18181b',
                        darkBorder: '#27272a',
                        lightBg: '#f8f9fa',
                        lightCard: '#ffffff',
                        lightBorder: '#e2e8f0',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        h1,
        .header-title {
            font-family: 'Space Grotesk', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.25);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.45);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background-color 0.3s;
        }
        .dot-live {
            background-color: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }
        .dot-offline {
            background-color: #ef4444;
        }
        .dot-unknown {
            background-color: #6b7280;
        }
        .pulse-dot {
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        .avatar-sm {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            transition: border-color 0.3s;
            flex-shrink: 0;
        }
        .avatar-sm.live-ring {
            border-color: #22c55e;
        }

        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }
        .dark .card-hover:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 8px;
        }

        .btn-icon {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            color: #6b7280;
        }
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .dark .btn-icon:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge-sm {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 1px 5px 1px 3px;
            border-radius: 999px;
        }
        .badge-live {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.12);
        }
        .badge-offline {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }

        .streamer-name {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.2;
        }
        .category-header {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
            border-bottom: 1px solid rgba(107, 114, 128, 0.15);
            padding-bottom: 4px;
            margin-bottom: 6px;
            grid-column: 1 / -1;
        }
        .dark .category-header {
            color: #9ca3af;
            border-bottom-color: rgba(156, 163, 175, 0.15);
        }
        .stat-icon {
            font-size: 12px;
            margin-right: 2px;
        }

        .loading-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-zinc-800 dark:text-zinc-100 min-h-screen flex flex-col relative overflow-x-hidden p-3 sm:p-5 select-none">

    <!-- Loading Screen -->
    <div id="app-loading-screen" class="fixed inset-0 bg-lightBg dark:bg-darkBg z-50 flex flex-col items-center justify-center transition-opacity duration-500 ease-in-out">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-500/10 dark:bg-blue-500/10 blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-500/10 dark:bg-purple-500/10 blur-[120px] pointer-events-none"></div>
        <div class="relative z-10 flex flex-col items-center space-y-4 text-center">
            <div class="relative w-16 h-16 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border-4 border-zinc-200 dark:border-zinc-800"></div>
                <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
            </div>
            <div>
                <h2 class="font-bold text-sm text-zinc-900 dark:text-zinc-100 uppercase tracking-widest font-mono">Loading Streamer List</h2>
                <p class="text-[10px] text-zinc-400 dark:text-zinc-500 mt-1 uppercase font-semibold tracking-wider">Fetching twitchStreamerList.txt ...</p>
            </div>
        </div>
    </div>

    <!-- Ambient Glows -->
    <div id="ambient-glow-1" class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-500/10 dark:bg-blue-500/10 blur-[120px] pointer-events-none transition-opacity duration-300"></div>
    <div id="ambient-glow-2" class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-500/10 dark:bg-purple-500/10 blur-[120px] pointer-events-none transition-opacity duration-300"></div>

    <!-- Main Container -->
    <div class="max-w-7xl w-full mx-auto flex flex-col gap-3 relative z-10">

        <!-- Header -->
        <header class="flex items-center justify-between p-2.5 bg-white/70 dark:bg-darkCard/50 border border-lightBorder dark:border-darkBorder rounded-2xl shadow-xl backdrop-blur-md relative select-none z-20">
            <div class="flex items-center space-x-2.5">
                <a href="../index.html" class="p-1.5 rounded-xl border border-lightBorder dark:border-darkBorder bg-white hover:bg-zinc-50 dark:bg-darkCard/50 dark:hover:bg-darkCard transition-all duration-200 text-zinc-600 dark:text-zinc-300 hover:text-indigo-600 dark:hover:text-indigo-400 cursor-pointer shadow-sm" title="Back to Index">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path>
                    </svg>
                </a>
                <div>
                    <h1 class="header-title text-xs sm:text-sm font-bold tracking-tight bg-gradient-to-r from-blue-500 to-indigo-500 bg-clip-text text-transparent select-none uppercase">Twitch Live Check</h1>
                    <p class="text-[7px] font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest mt-0.5 whitespace-nowrap">Live Dashboard</p>
                </div>
            </div>

            <div id="header-clock" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 hidden md:flex flex-col items-center justify-center text-center select-none z-0">
                <span id="clock-time" class="text-xs sm:text-sm font-bold tracking-wider text-zinc-700 dark:text-zinc-200">00:00:00</span>
                <span id="clock-date" class="text-[7px] sm:text-[8px] font-semibold uppercase tracking-widest text-zinc-400 dark:text-zinc-500 mt-0.5 whitespace-nowrap">Sunday, June 21, 2026</span>
            </div>

            <div class="flex items-center space-x-2 sm:space-x-2.5 relative z-10">
                <div class="hidden lg:flex items-center space-x-2 text-[8px] font-bold tracking-wider uppercase border border-lightBorder dark:border-darkBorder px-2.5 py-1 rounded-full bg-white/30 dark:bg-darkCard/30 text-zinc-500 dark:text-zinc-400">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-zinc-400 animate-pulse" id="statusDot"></span>
                    <span id="statusText">INITIALIZING...</span>
                </div>

                <button id="gradient-toggle" class="p-1.5 rounded-xl border border-lightBorder dark:border-darkBorder bg-white/70 dark:bg-darkCard/50 backdrop-blur-md hover:bg-white dark:hover:bg-darkCard transition-all duration-200 focus:outline-none shadow-sm flex items-center justify-center cursor-pointer">
                    <svg class="w-3.5 h-3.5 text-zinc-600 dark:text-zinc-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM17 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2zM5 15a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM17 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2z" />
                    </svg>
                </button>

                <button id="theme-toggle" class="p-1.5 rounded-lg border border-lightBorder dark:border-darkBorder bg-white/70 dark:bg-darkCard/50 hover:bg-white dark:hover:bg-darkCard transition-all focus:outline-none flex items-center justify-center cursor-pointer shadow-sm">
                    <svg id="theme-toggle-sun-icon" class="hidden w-3.5 h-3.5 text-yellow-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 11H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <svg id="theme-toggle-moon-icon" class="hidden w-3.5 h-3.5 text-zinc-100" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats Summary - hardcoded emojis, no "??" -->
        <section class="grid grid-cols-3 gap-2">
            <div class="flex flex-col items-center justify-center p-1.5 bg-white/70 dark:bg-darkCard/50 border border-lightBorder dark:border-darkBorder rounded-xl shadow-lg backdrop-blur-md text-center">
                <span class="text-[7px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Tracked</span>
                <span class="text-base font-extrabold tracking-tight text-zinc-950 dark:text-zinc-100" id="totalCount">0</span>
            </div>
            <div class="flex flex-col items-center justify-center p-1.5 bg-white/70 dark:bg-darkCard/50 border border-lightBorder dark:border-darkBorder rounded-xl shadow-lg backdrop-blur-md text-center">
                <span class="text-[7px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest flex items-center justify-center gap-0.5"><span class="text-emerald-500 text-xs">ˇń</span> Live</span>
                <span class="text-base font-extrabold tracking-tight text-emerald-500" id="liveCount">0</span>
            </div>
            <div class="flex flex-col items-center justify-center p-1.5 bg-white/70 dark:bg-darkCard/50 border border-lightBorder dark:border-darkBorder rounded-xl shadow-lg backdrop-blur-md text-center">
                <span class="text-[7px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest flex items-center justify-center gap-0.5"><span class="text-rose-500 text-xs">ˇń</span> Offline</span>
                <span class="text-base font-extrabold tracking-tight text-rose-500" id="offlineCount">0</span>
            </div>
        </section>

        <!-- Toolbar -->
        <div class="flex items-center justify-between gap-2 flex-wrap">
            <div class="flex items-center gap-2 text-[10px] text-zinc-400 dark:text-zinc-500">
                <input type="checkbox" id="autoRefreshCheck" checked class="w-3 h-3 accent-indigo-500 cursor-pointer" />
                <label for="autoRefreshCheck" class="cursor-pointer select-none font-medium">Auto-refresh (60s)</label>
                <span class="text-zinc-300 dark:text-zinc-600">|</span>
                <span class="font-mono text-[9px]">Last update: <span id="lastUpdate">--</span></span>
            </div>
            <button id="refreshAllBtn" class="py-1 px-3.5 font-bold text-[9px] uppercase tracking-widest bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg shadow transition duration-200 cursor-pointer flex items-center gap-1.5">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Refresh All
            </button>
        </div>

        <!-- Grid Container -->
        <div id="streamerGrid" class="grid-container">
            <!-- Cards injected here -->
        </div>

        <!-- Footer -->
        <footer class="text-center text-[8px] font-medium text-zinc-400 dark:text-zinc-500 tracking-wide select-none py-1.5 border-t border-lightBorder dark:border-darkBorder/30 mt-1">
            <span>Fraagle Apps ? Twitch Live Check ? <span id="footerVersion">v2.4</span></span>
        </footer>

    </div>

    <script>
        // ================================================================
        //  TWITCH LIVE CHECK ? v2.4 ¨C Fixed stats labels & avatars
        //  Uses ui-avatars.com as reliable fallback for avatars
        // ================================================================

        const LiveDashboard = {
            LIST_URL: 'twitchStreamerList.txt',

            streamers: [],
            statusData: [],
            lastChecked: null,
            refreshInterval: null,
            isLoading: false,

            el: {
                grid: document.getElementById('streamerGrid'),
                totalCount: document.getElementById('totalCount'),
                liveCount: document.getElementById('liveCount'),
                offlineCount: document.getElementById('offlineCount'),
                lastUpdate: document.getElementById('lastUpdate'),
                refreshBtn: document.getElementById('refreshAllBtn'),
                autoRefreshCheck: document.getElementById('autoRefreshCheck'),
                statusText: document.getElementById('statusText'),
                statusDot: document.getElementById('statusDot'),
                loadingScreen: document.getElementById('app-loading-screen'),
            },

            init: function() {
                this.el.refreshBtn.addEventListener('click', () => {
                    this.fetchAllStatuses();
                });

                this.el.autoRefreshCheck.addEventListener('change', () => {
                    if (this.el.autoRefreshCheck.checked) {
                        this.startAutoRefresh();
                    } else {
                        this.stopAutoRefresh();
                    }
                });

                this.loadStreamerListAndFetch();

                if (this.el.autoRefreshCheck.checked) {
                    this.startAutoRefresh();
                }

                this.setupThemeToggle();
                this.setupGradientToggle();
                this.setupClock();
            },

            hideLoadingScreen: function() {
                const loader = this.el.loadingScreen;
                if (loader && !loader.classList.contains('loading-hidden')) {
                    loader.classList.add('loading-hidden');
                    setTimeout(() => {
                        if (loader.parentNode) loader.remove();
                    }, 600);
                }
            },

            loadStreamerListAndFetch: async function() {
                if (this.isLoading) return;
                this.isLoading = true;

                this.setStatus('LOADING LIST...', 'loading');
                this.el.refreshBtn.disabled = true;

                try {
                    const url = `${this.LIST_URL}?t=${Date.now()}`;
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                    const text = await response.text();

                    const parsed = this.parseStreamerList(text);
                    this.streamers = parsed;

                    this.hideLoadingScreen();
                    await this.fetchAllStatuses();

                } catch (err) {
                    console.error('Failed to load streamer list:', err);
                    this.setStatus('LIST ERROR', '');
                    this.hideLoadingScreen();

                    this.el.grid.innerHTML = `
                        <div class="col-span-full text-center text-rose-500 dark:text-rose-400 text-sm py-8">
                            ?? Could not load <code>twitchStreamerList.txt</code><br/>
                            <span class="text-xs text-zinc-400">${err.message}</span>
                            <br/>
                            <button onclick="LiveDashboard.retryLoadList()" class="mt-2 px-4 py-1.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg text-xs transition cursor-pointer">
                                ? Retry
                            </button>
                        </div>
                    `;
                    this.updateStats([]);
                } finally {
                    this.isLoading = false;
                    this.el.refreshBtn.disabled = false;
                }
            },

            retryLoadList: function() {
                this.loadStreamerListAndFetch();
            },

            parseStreamerList: function(text) {
                const lines = text.split('\n');
                let currentCategory = 'General';
                const result = [];

                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;

                    if (line.startsWith('#')) {
                        currentCategory = line.substring(1).trim();
                        continue;
                    }

                    const match = line.match(/twitch\.tv\/([a-zA-Z0-9_]+)/);
                    if (match) {
                        const username = match[1];
                        const display = username.charAt(0).toUpperCase() + username.slice(1);
                        result.push({
                            name: username,
                            display: display,
                            category: currentCategory
                        });
                    }
                }
                return result;
            },

            fetchAllStatuses: async function() {
                if (this.streamers.length === 0) {
                    this.el.grid.innerHTML =
                        `<div class="col-span-full text-center text-zinc-400 dark:text-zinc-500 text-sm py-8">No streamers found in list.</div>`;
                    this.updateStats([]);
                    return;
                }

                this.setStatus('FETCHING...', 'loading');
                this.el.refreshBtn.disabled = true;

                const promises = this.streamers.map(async (s) => {
                    try {
                        const res = await fetch(`https://decapi.me/twitch/uptime/${s.name}`, { cache: 'no-store' });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const text = await res.text();
                        const trimmed = text.trim().toLowerCase();

                        const isOffline = trimmed === '' ||
                            trimmed === 'offline' ||
                            trimmed.includes('offline') ||
                            trimmed.includes('error') ||
                            trimmed.includes('not found');

                        const isLive = !isOffline && trimmed.length > 0;

                        return { ...s, isLive, error: false };
                    } catch (err) {
                        return { ...s, isLive: false, error: true };
                    }
                });

                try {
                    const results = await Promise.all(promises);
                    this.statusData = results;
                    this.lastChecked = new Date();
                    this.renderGrid(results);
                    this.updateStats(results);
                    this.updateLastUpdate();
                    this.setStatus('READY', 'ready');
                } catch (err) {
                    this.setStatus('ERROR', '');
                } finally {
                    this.el.refreshBtn.disabled = false;
                }
            },

            renderGrid: function(data) {
                const grid = this.el.grid;
                if (!grid) return;

                if (data.length === 0) {
                    grid.innerHTML =
                        `<div class="col-span-full text-center text-zinc-400 dark:text-zinc-500 text-sm py-8">No streamers to display.</div>`;
                    return;
                }

                const groups = {};
                data.forEach(s => {
                    const cat = s.category || 'General';
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(s);
                });

                let html = '';
                const sortedCategories = Object.keys(groups).sort();
                for (const cat of sortedCategories) {
                    const items = groups[cat];
                    html += `<div class="category-header">${cat}</div>`;
                    items.forEach(s => {
                        const isLive = s.isLive === true;
                        const badgeClass = isLive ? 'badge-live' : 'badge-offline';
                        const ringClass = isLive ? 'live-ring' : '';
                        // Use a reliable fallback: ui-avatars.com if unavatar fails
                        const avatarUrl = `https://unavatar.io/twitch/${s.name}`;

                        html += `
                            <div class="card-hover bg-white/60 dark:bg-darkCard/50 border border-lightBorder dark:border-darkBorder rounded-xl p-2 flex items-center gap-2 transition-all duration-200">
                                <img class="avatar-sm ${ringClass}" 
                                     src="${avatarUrl}" 
                                     alt="${s.display}" 
                                     onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.display)}&background=random&size=32&rounded=true';" />
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-1">
                                        <span class="streamer-name truncate text-zinc-900 dark:text-zinc-100">${s.display}</span>
                                        <span class="status-dot ${isLive ? 'dot-live pulse-dot' : 'dot-offline'}" style="width:7px;height:7px;"></span>
                                    </div>
                                    <div class="flex items-center gap-1 mt-0.5">
                                        <span class="status-badge-sm ${badgeClass}">
                                            <span class="${isLive ? 'dot-live' : 'dot-offline'}" style="width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
                                            ${isLive ? 'LIVE' : 'OFF'}
                                        </span>
                                        ${s.error ? `<span class="text-zinc-400 text-[7px]">??</span>` : ''}
                                    </div>
                                </div>
                                <a href="https://www.twitch.tv/${s.name}" target="_blank" rel="noopener noreferrer" class="btn-icon hover:text-indigo-500 dark:hover:text-indigo-400" title="Watch ${s.display}">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M11.64 5.93h1.43v4.28h-1.43m3.57-4.28h1.43v4.28h-1.43m-7.14 0H7.07v4.28h1.43m8.57-7.14L17.5 1H6.5L2 5.5v12.86h3.57V23l4.29-4.29h5.36L21 14.5V5.5l-2.5-2.5zm-13.57 2.5L9.5 2.43h9.43L21 5.5v7.5l-2.5 2.5H12.5l-3.57 3.57v-3.57H5.5V5.5z"/>
                                    </svg>
                                </a>
                            </div>
                        `;
                    });
                }

                grid.innerHTML = html;
            },

            updateStats: function(data) {
                const total = data.length;
                const live = data.filter(s => s.isLive === true).length;
                const offline = total - live;
                this.el.totalCount.textContent = total;
                this.el.liveCount.textContent = live;
                this.el.offlineCount.textContent = offline;
            },

            updateLastUpdate: function() {
                if (this.lastChecked) {
                    this.el.lastUpdate.textContent = this.lastChecked.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit',
                        second: '2-digit' });
                }
            },

            startAutoRefresh: function() {
                if (this.refreshInterval) clearInterval(this.refreshInterval);
                this.refreshInterval = setInterval(() => {
                    this.fetchAllStatuses();
                }, 60000);
            },

            stopAutoRefresh: function() {
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }
            },

            setStatus: function(text, state) {
                if (this.el.statusText) this.el.statusText.textContent = text;
                if (this.el.statusDot) {
                    this.el.statusDot.className = 'w-1.5 h-1.5 rounded-full bg-zinc-400';
                    if (state === 'loading') this.el.statusDot.classList.add('bg-[#107c41]', 'animate-pulse');
                    if (state === 'ready') this.el.statusDot.classList.add('bg-emerald-500',
                        'shadow-[0_0_8px_rgba(16,185,129,0.6)]');
                }
            },

            setupThemeToggle: function() {
                const btn = document.getElementById('theme-toggle');
                const sun = document.getElementById('theme-toggle-sun-icon');
                const moon = document.getElementById('theme-toggle-moon-icon');

                const applyTheme = (theme) => {
                    if (theme === 'dark') {
                        document.documentElement.classList.add('dark');
                        sun.classList.add('hidden');
                        moon.classList.remove('hidden');
                    } else {
                        document.documentElement.classList.remove('dark');
                        sun.classList.remove('hidden');
                        moon.classList.add('hidden');
                    }
                    localStorage.setItem('theme', theme);
                };

                const current = localStorage.getItem('theme') || 'dark';
                applyTheme(current);

                btn.addEventListener('click', () => {
                    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
                    applyTheme(next);
                });
            },

            setupGradientToggle: function() {
                const btn = document.getElementById('gradient-toggle');
                const g1 = document.getElementById('ambient-glow-1');
                const g2 = document.getElementById('ambient-glow-2');

                const apply = (state) => {
                    if (state === 'enabled') {
                        g1.classList.remove('opacity-0', 'pointer-events-none');
                        g2.classList.remove('opacity-0', 'pointer-events-none');
                        btn.classList.remove('opacity-40');
                    } else {
                        g1.classList.add('opacity-0', 'pointer-events-none');
                        g2.classList.add('opacity-0', 'pointer-events-none');
                        btn.classList.add('opacity-40');
                    }
                };

                const saved = localStorage.getItem('ambient-glow') || 'enabled';
                apply(saved);

                btn.addEventListener('click', () => {
                    const current = localStorage.getItem('ambient-glow') || 'enabled';
                    const next = current === 'enabled' ? 'disabled' : 'enabled';
                    localStorage.setItem('ambient-glow', next);
                    apply(next);
                });
            },

            setupClock: function() {
                const update = () => {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit',
                        hour12: false });
                    const dateStr = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long',
                        day: 'numeric' });
                    const te = document.getElementById('clock-time');
                    const de = document.getElementById('clock-date');
                    if (te) te.textContent = timeStr;
                    if (de) de.textContent = dateStr;
                };
                setInterval(update, 1000);
                update();
            }
        };

        LiveDashboard.retryLoadList = LiveDashboard.retryLoadList.bind(LiveDashboard);

        document.addEventListener('DOMContentLoaded', () => LiveDashboard.init());
    </script>
</body>
</html>
