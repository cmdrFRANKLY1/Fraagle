<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prapor Quest Flowchart – Multi‑View</title>
    <style>
        /* ===== minimal layout – same style ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 1rem;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header h1 {
            font-weight: 400;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .options-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 1rem;
            margin-bottom: 0.5rem;
        }
        .btn-group {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .btn {
            border: 1px solid #ccc;
            padding: 0.1rem 0.8rem;
            background: transparent;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.1s;
        }
        .btn:hover {
            background: #eee;
        }
        .btn:active {
            background: #ddd;
        }
        .stats {
            font-size: 0.8rem;
            margin-left: auto;
            opacity: 0.7;
            white-space: nowrap;
        }
        .view-select {
            border: 1px solid #ccc;
            background: transparent;
            padding: 0.1rem 0.4rem;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .main-content {
            display: flex;
            height: 600px;
            min-height: 300px;
            max-height: 900px;
            overflow: hidden;
            border: 1px solid #ccc;
            background: #fff;
        }

        .panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 100px;
            overflow: hidden;
        }
        .panel-header {
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            background: #f8f8f8;
        }
        .badge {
            font-size: 0.7rem;
            opacity: 0.6;
            font-weight: 300;
        }
        .panel-body {
            padding: 0.5rem;
            flex: 1;
            overflow: auto;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .splitter-h {
            flex: 0 0 1px;
            cursor: ew-resize;
            position: relative;
            z-index: 2;
            background: #ccc;
        }
        .splitter-h:hover {
            background: #999;
        }
        .splitter-h.active {
            background: #666;
        }

        /* ===== shared node styles ===== */
        .quest-node {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
            position: relative;
            z-index: 1;
            max-width: 100%;
            white-space: nowrap;
            user-select: none;
        }
        .quest-node:hover {
            background: #f0f4ff;
            border-color: #8899bb;
        }
        .quest-node.active {
            background: #e0e8f5;
            border-color: #4466aa;
            box-shadow: 0 0 0 2px rgba(68, 102, 170, 0.2);
        }
        .quest-node .node-name {
            font-weight: 500;
        }
        .quest-node .node-badge {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-left: 0.4rem;
            font-weight: 300;
        }

        /* ===== tree view ===== */
        .tree-root {
            padding: 0.5rem 0;
        }
        .tree-root ul {
            padding-left: 1.8rem;
            list-style: none;
            position: relative;
            margin: 0;
        }
        .tree-root ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0.5rem;
            width: 1px;
            height: 100%;
            background: #ccc;
        }
        .tree-root li {
            position: relative;
            padding: 0.3rem 0 0.3rem 1.2rem;
            margin: 0;
        }
        .tree-root li::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1.2rem;
            height: 100%;
            border-left: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            border-radius: 0 0 0 4px;
        }
        .tree-root li:last-child::before {
            border-bottom: 1px solid #ccc;
            height: 1.2rem;
            top: 0;
        }
        .tree-root li:only-child::before {
            border-bottom: 1px solid #ccc;
            height: 1.2rem;
            top: 0;
        }
        .tree-root>ul>li::before {
            border-left: none;
            border-bottom: none;
        }
        .tree-root>ul::before {
            display: none;
        }

        /* ===== accordion view ===== */
        .accordion-root {
            padding: 0.2rem 0;
        }
        .accordion-root details {
            margin: 0.2rem 0;
            padding-left: 0.5rem;
            border-left: 2px solid #eee;
        }
        .accordion-root details summary {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.1rem 0;
            outline: none;
        }
        .accordion-root details summary::-webkit-details-marker {
            color: #888;
        }
        .accordion-root details summary .quest-node {
            white-space: normal;
        }
        .accordion-root details[open] {
            border-left-color: #aaa;
        }
        .accordion-root details .child-container {
            padding-left: 1.2rem;
        }

        /* ===== flat view ===== */
        .flat-root {
            padding: 0.2rem 0;
        }
        .flat-root ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .flat-root li {
            padding: 0.15rem 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .flat-root li .meta {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        /* ===== chain view ===== */
        .chain-root {
            padding: 0.5rem 0;
        }
        .chain-root .path {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.2rem 0.4rem;
            padding: 0.3rem 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 0.5rem;
        }
        .chain-root .path .arrow {
            opacity: 0.4;
        }
        .chain-root .path .quest-node {
            font-size: 0.8rem;
            padding: 0.1rem 0.5rem;
        }
        .chain-root .children-section {
            margin-top: 0.5rem;
        }
        .chain-root .children-section h4 {
            font-weight: 400;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 0.2rem;
        }
        .chain-root .children-section .child-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        /* ===== detail panel ===== */
        .detail-empty {
            color: #999;
            font-style: italic;
        }
        .detail-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.25rem;
        }
        .detail-section {
            margin-top: 1rem;
        }
        .detail-section h4 {
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
            margin-bottom: 0.2rem;
        }
        .detail-section p {
            font-size: 0.9rem;
            padding-left: 0.75rem;
            border-left: 2px solid #ddd;
        }
        .detail-rewards ul {
            list-style: none;
            padding-left: 0.75rem;
            border-left: 2px solid #ddd;
        }
        .detail-rewards ul li {
            font-size: 0.9rem;
            padding: 0.1rem 0;
        }
        .detail-rewards ul li::before {
            content: '• ';
            opacity: 0.6;
        }

        @media (max-width: 800px) {
            .main-content {
                flex-wrap: wrap;
                height: auto;
                min-height: auto;
                max-height: none;
            }
            .splitter-h {
                display: none;
            }
            .panel {
                min-height: 250px;
                border-bottom: 1px solid #eee;
            }
            .panel:last-child {
                border-bottom: none;
            }
        }

        .panel-body::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .panel-body::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        .panel-body::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>
<body>
<div class="container">
    <header><h1>📍 Prapor – Quest Flowchart (Escape from Tarkov)</h1></header>

    <div class="options-bar">
        <div class="btn-group">
            <button class="btn" id="expandAllBtn">[ expand all ]</button>
            <button class="btn" id="collapseAllBtn">[ collapse all ]</button>
            <button class="btn" id="resetViewBtn">[ reset view ]</button>
        </div>
        <select class="view-select" id="viewType">
            <option value="tree">Tree</option>
            <option value="accordion">Accordion</option>
            <option value="flat">Flat List</option>
            <option value="chain">Chain (selected)</option>
        </select>
        <span class="stats" id="stats">0 nodes</span>
    </div>

    <div class="main-content" id="mainContent">
        <div class="panel" id="flowchartPanel">
            <div class="panel-header">
                <span>quest tree</span>
                <span class="badge" id="nodeCount">0</span>
            </div>
            <div class="panel-body" id="treeContainer">
                <!-- rendered by JS -->
            </div>
        </div>

        <div class="splitter-h" id="splitter"></div>

        <div class="panel" id="detailPanel">
            <div class="panel-header">
                <span>quest details</span>
                <span class="badge">info</span>
            </div>
            <div class="panel-body" id="detailBody">
                <div class="detail-empty">← click a quest node</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ================================================================
        //  DATA – Prapor quest tree
        // ================================================================
        const questData = {
            name: "Debut",
            requirements: "Reach level 2 • Hand over 2 MP-133 shotguns • Kill 5 Scavs on Customs",
            rewards: ["+2,000 EXP", "9,000 Roubles", "2× RGD-5 grenade", "Unlocks: Bad Rep Evidence, Checking"],
            children: [{
                name: "Bad Rep Evidence",
                requirements: "Find the container of alcohol in Dorms (Customs) • Hand it over",
                rewards: ["+3,000 EXP", "10,000 Roubles", "1× PACA armor", "Unlocks: Ice Cream Cones"],
                children: [{
                    name: "Ice Cream Cones",
                    requirements: "Find 4 60-round 6L31 magazines for AK • Hand them over",
                    rewards: ["+4,000 EXP", "12,000 Roubles", "1× AK-74N", "Unlocks: The Punisher - Part 1"],
                    children: [{
                        name: "The Punisher - Part 1",
                        requirements: "Kill 15 Scavs on Shoreline while using an AKM series weapon",
                        rewards: ["+5,000 EXP", "15,000 Roubles", "1× Vepr AKM", "Unlocks: Punisher - Part 2"],
                        children: [{
                            name: "The Punisher - Part 2",
                            requirements: "Kill 25 Scavs on Customs while using an AKS-74U",
                            rewards: ["+6,000 EXP", "18,000 Roubles", "1× AKS-74UB", "Unlocks: Punisher - Part 3"],
                            children: [{
                                name: "The Punisher - Part 3",
                                requirements: "Kill 25 Scavs on Woods while wearing a Balaclava and Scav Vest",
                                rewards: ["+7,000 EXP", "20,000 Roubles", "1× SV-98", "Unlocks: Punisher - Part 4"],
                                children: [{
                                    name: "The Punisher - Part 4",
                                    requirements: "Kill 10 PMCs on Shoreline using a suppressed sniper rifle",
                                    rewards: ["+8,000 EXP", "25,000 Roubles", "1× M1A", "Unlocks: Punisher - Part 5"],
                                    children: [{
                                        name: "The Punisher - Part 5",
                                        requirements: "Kill 20 PMCs on any map using an AK series weapon",
                                        rewards: ["+9,000 EXP", "30,000 Roubles", "1× AK-104", "Unlocks: Punisher - Part 6"],
                                        children: [{
                                            name: "The Punisher - Part 6",
                                            requirements: "Kill 12 PMCs on Factory with a specific loadout (Paca, 6B47, PP-19-01)",
                                            rewards: ["+15,000 EXP", "50,000 Roubles", "Epsilon container (2x4)", "Unlocks: Test Drive - Part 1"],
                                            children: [{
                                                name: "Test Drive - Part 1",
                                                requirements: "Level 35 • Kill 50 PMCs using a thermal G28 • Requires 'The Huntsman Path - Eraser' (Jaeger)",
                                                rewards: ["+20,000 EXP", "75,000 Roubles", "1× G28", "Tactical thermal scope"],
                                                children: []
                                            }]
                                        }]
                                    }]
                                }]
                            }]
                        }]
                    }]
                }]
            }, {
                name: "Checking",
                requirements: "Find the bronze pocket watch in the tank near the dorms (Customs)",
                rewards: ["+3,000 EXP", "8,000 Roubles", "1× Makarov PM", "Unlocks: Delivery from the Past"],
                children: [{
                    name: "Delivery from the Past",
                    requirements: "Retrieve the secure case from the train car on Customs • Deliver it to Factory (survive)",
                    rewards: ["+4,500 EXP", "12,000 Roubles", "1× AKS-74U", "Unlocks: (Skier quests)"],
                    children: []
                }]
            }]
        };

        // ================================================================
        //  STATE
        // ================================================================
        let selectedNode = null;       // reference to node object
        let selectedNodeName = null;   // for highlighting
        let currentView = 'tree';
        const treeContainer = document.getElementById('treeContainer');
        const detailBody = document.getElementById('detailBody');
        const nodeCountSpan = document.getElementById('nodeCount');
        const statsSpan = document.getElementById('stats');
        const viewSelect = document.getElementById('viewType');

        // ================================================================
        //  HELPERS
        // ================================================================
        function countAllNodes(node) {
            let count = 1;
            if (node.children) {
                for (const child of node.children) {
                    count += countAllNodes(child);
                }
            }
            return count;
        }

        // collect all nodes with parent references (for flat list)
        function collectNodesWithParent(node, parent = null) {
            const list = [];
            list.push({ node, parent });
            if (node.children) {
                for (const child of node.children) {
                    list.push(...collectNodesWithParent(child, node));
                }
            }
            return list;
        }

        // find node by name (deep search)
        function findNodeByName(root, name) {
            if (root.name === name) return root;
            if (root.children) {
                for (const child of root.children) {
                    const found = findNodeByName(child, name);
                    if (found) return found;
                }
            }
            return null;
        }

        // get path from root to node
        function getPath(root, target) {
            function search(node, path) {
                path.push(node);
                if (node === target) return path;
                if (node.children) {
                    for (const child of node.children) {
                        const result = search(child, path.slice());
                        if (result) return result;
                    }
                }
                return null;
            }
            return search(root, []);
        }

        // ================================================================
        //  RENDER FUNCTIONS (each returns DOM element)
        // ================================================================

        // --- shared: create a clickable quest node ---
        function createNodeElement(node, highlight = false) {
            const span = document.createElement('span');
            span.className = 'quest-node' + (highlight ? ' active' : '');
            span.dataset.quest = node.name;
            const nameSpan = document.createElement('span');
            nameSpan.className = 'node-name';
            nameSpan.textContent = node.name;
            span.appendChild(nameSpan);
            if (node.children && node.children.length > 0) {
                const badge = document.createElement('span');
                badge.className = 'node-badge';
                badge.textContent = `(${node.children.length})`;
                span.appendChild(badge);
            }
            span.addEventListener('click', function(e) {
                e.stopPropagation();
                selectNode(node);
                // highlight in current view (will re-render on selection)
                // We'll re-render the whole view on select to update highlights.
                renderView(currentView);
            });
            return span;
        }

        // --- Tree view ---
        function renderTreeView(root, selectedName) {
            const container = document.createElement('div');
            container.className = 'tree-root';

            function buildTree(node) {
                const ul = document.createElement('ul');
                if (node.children) {
                    for (const child of node.children) {
                        const li = document.createElement('li');
                        const el = createNodeElement(child, child.name === selectedName);
                        li.appendChild(el);
                        // children
                        if (child.children && child.children.length > 0) {
                            const childUl = buildTree(child);
                            childUl.className = 'child-list';
                            childUl.style.display = 'block';
                            li.appendChild(childUl);
                        }
                        ul.appendChild(li);
                    }
                }
                return ul;
            }

            // root itself is not shown as a node, but we can show it? We'll show the root as a special heading.
            // Actually we'll display the root as a node at the top? Better to show it as a header.
            const rootHeader = document.createElement('div');
            rootHeader.style.padding = '0.2rem 0.5rem';
            rootHeader.style.fontWeight = '500';
            rootHeader.style.borderBottom = '1px solid #ddd';
            rootHeader.style.marginBottom = '0.5rem';
            const rootEl = createNodeElement(root, root.name === selectedName);
            rootHeader.appendChild(rootEl);
            container.appendChild(rootHeader);

            const childrenUl = buildTree(root);
            container.appendChild(childrenUl);
            return container;
        }

        // --- Accordion view ---
        function renderAccordionView(root, selectedName) {
            const container = document.createElement('div');
            container.className = 'accordion-root';

            function buildAccordion(node, depth = 0) {
                const details = document.createElement('details');
                if (depth === 0) details.open = true; // root expanded
                const summary = document.createElement('summary');
                const el = createNodeElement(node, node.name === selectedName);
                summary.appendChild(el);
                details.appendChild(summary);

                if (node.children && node.children.length > 0) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'child-container';
                    for (const child of node.children) {
                        childContainer.appendChild(buildAccordion(child, depth + 1));
                    }
                    details.appendChild(childContainer);
                }
                return details;
            }

            // We'll show root as accordion
            const rootAcc = buildAccordion(root, 0);
            container.appendChild(rootAcc);
            return container;
        }

        // --- Flat List view ---
        function renderFlatView(root, selectedName) {
            const container = document.createElement('div');
            container.className = 'flat-root';
            const all = collectNodesWithParent(root);
            const ul = document.createElement('ul');
            for (const { node, parent } of all) {
                const li = document.createElement('li');
                const el = createNodeElement(node, node.name === selectedName);
                li.appendChild(el);
                const meta = document.createElement('span');
                meta.className = 'meta';
                const parentName = parent ? parent.name : '(root)';
                const childCount = (node.children && node.children.length) || 0;
                meta.textContent = `← ${parentName} · ${childCount} unlocks`;
                li.appendChild(meta);
                ul.appendChild(li);
            }
            container.appendChild(ul);
            return container;
        }

        // --- Chain view (selected node path + children) ---
        function renderChainView(root, selectedNodeObj) {
            const container = document.createElement('div');
            container.className = 'chain-root';

            if (!selectedNodeObj) {
                container.innerHTML = '<div style="opacity:0.6;font-style:italic;">select a quest to see its chain</div>';
                return container;
            }

            // Path
            const path = getPath(root, selectedNodeObj);
            if (path) {
                const pathDiv = document.createElement('div');
                pathDiv.className = 'path';
                for (let i = 0; i < path.length; i++) {
                    const node = path[i];
                    const el = createNodeElement(node, node.name === selectedNodeObj.name);
                    pathDiv.appendChild(el);
                    if (i < path.length - 1) {
                        const arrow = document.createElement('span');
                        arrow.className = 'arrow';
                        arrow.textContent = '→';
                        pathDiv.appendChild(arrow);
                    }
                }
                container.appendChild(pathDiv);
            }

            // Children of selected
            const childrenSection = document.createElement('div');
            childrenSection.className = 'children-section';
            const header = document.createElement('h4');
            header.textContent = 'Unlocked quests:';
            childrenSection.appendChild(header);
            const childList = document.createElement('div');
            childList.className = 'child-list';
            if (selectedNodeObj.children && selectedNodeObj.children.length > 0) {
                for (const child of selectedNodeObj.children) {
                    const el = createNodeElement(child, child.name === selectedNodeObj.name);
                    childList.appendChild(el);
                }
            } else {
                const none = document.createElement('span');
                none.style.opacity = '0.5';
                none.textContent = 'none';
                childList.appendChild(none);
            }
            childrenSection.appendChild(childList);
            container.appendChild(childrenSection);

            return container;
        }

        // ================================================================
        //  RENDER DISPATCHER
        // ================================================================
        function renderView(viewType) {
            const root = questData;
            const selectedName = selectedNode ? selectedNode.name : null;

            let viewElement;
            switch (viewType) {
                case 'tree':
                    viewElement = renderTreeView(root, selectedName);
                    break;
                case 'accordion':
                    viewElement = renderAccordionView(root, selectedName);
                    break;
                case 'flat':
                    viewElement = renderFlatView(root, selectedName);
                    break;
                case 'chain':
                    viewElement = renderChainView(root, selectedNode);
                    break;
                default:
                    viewElement = renderTreeView(root, selectedName);
            }

            // Clear and append
            treeContainer.innerHTML = '';
            treeContainer.appendChild(viewElement);

            // Update node count
            const total = countAllNodes(root);
            nodeCountSpan.textContent = total;
            statsSpan.textContent = `${total} quests · ${viewType} view`;
        }

        // ================================================================
        //  SELECTION & DETAILS
        // ================================================================
        function selectNode(node) {
            selectedNode = node;
            selectedNodeName = node.name;
            renderDetails(node);
            // Re-render view to update highlights
            renderView(currentView);
        }

        function renderDetails(node) {
            if (!node) {
                detailBody.innerHTML = `<div class="detail-empty">← click a quest node</div>`;
                return;
            }
            let html = '';
            html += `<div class="detail-title">${node.name}</div>`;
            html += `<div class="detail-section"><h4>requirements</h4><p>${node.requirements || 'none'}</p></div>`;
            if (node.rewards && node.rewards.length > 0) {
                html += `<div class="detail-section detail-rewards"><h4>rewards</h4><ul>`;
                for (const reward of node.rewards) {
                    html += `<li>${reward}</li>`;
                }
                html += `</ul></div>`;
            }
            const childCount = (node.children && node.children.length) || 0;
            html += `<div class="detail-section" style="margin-top:1rem;opacity:0.6;font-size:0.8rem;">`;
            html += `unlocks ${childCount} quest${childCount !== 1 ? 's' : ''}`;
            if (childCount > 0) {
                html += `: ${node.children.map(c => c.name).join(', ')}`;
            }
            html += `</div>`;
            detailBody.innerHTML = html;
        }

        // ================================================================
        //  VIEW SWITCHING
        // ================================================================
        function setView(view) {
            currentView = view;
            renderView(view);
            // Adjust expand/collapse behaviour for the view
            // For tree/accordion we can support expand/collapse
        }

        // ================================================================
        //  EXPAND / COLLAPSE (works for tree and accordion)
        // ================================================================
        function expandAll() {
            if (currentView === 'tree') {
                document.querySelectorAll('.tree-root .child-list').forEach(ul => ul.style.display = 'block');
            } else if (currentView === 'accordion') {
                document.querySelectorAll('.accordion-root details').forEach(d => d.open = true);
            }
            // For flat and chain, no expand/collapse needed.
        }

        function collapseAll() {
            if (currentView === 'tree') {
                document.querySelectorAll('.tree-root .child-list').forEach(ul => ul.style.display = 'none');
            } else if (currentView === 'accordion') {
                // collapse all except root? we can collapse all details.
                document.querySelectorAll('.accordion-root details').forEach(d => d.open = false);
                // open root
                const rootDetails = document.querySelector('.accordion-root details');
                if (rootDetails) rootDetails.open = true;
            }
        }

        function resetView() {
            // reset selection
            selectedNode = null;
            selectedNodeName = null;
            renderDetails(null);
            // expand all (or default state)
            if (currentView === 'tree' || currentView === 'accordion') {
                expandAll();
            }
            // For chain, we need to show the default empty state
            renderView(currentView);
            // clear active highlights
            document.querySelectorAll('.quest-node').forEach(el => el.classList.remove('active'));
        }

        // ================================================================
        //  SPLITTER (same)
        // ================================================================
        function initSplitter() {
            const splitter = document.getElementById('splitter');
            const leftPanel = document.getElementById('flowchartPanel');
            const rightPanel = document.getElementById('detailPanel');
            let dragging = false,
                startX, startLeftWidth, startRightWidth;

            splitter.addEventListener('mousedown', function(e) {
                dragging = true;
                splitter.classList.add('active');
                startX = e.clientX;
                startLeftWidth = leftPanel.offsetWidth;
                startRightWidth = rightPanel.offsetWidth;
                document.body.style.cursor = 'ew-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                const delta = e.clientX - startX;
                let newLeft = startLeftWidth + delta;
                let newRight = startRightWidth - delta;
                const minW = 120;
                if (newLeft < minW) { newLeft = minW;
                    newRight = startLeftWidth + startRightWidth - newLeft; }
                if (newRight < minW) { newRight = minW;
                    newLeft = startLeftWidth + startRightWidth - newRight; }
                leftPanel.style.flex = `0 0 ${newLeft}px`;
                rightPanel.style.flex = `0 0 ${newRight}px`;
            });

            document.addEventListener('mouseup', function() {
                if (dragging) {
                    dragging = false;
                    splitter.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });

            splitter.addEventListener('dblclick', function() {
                leftPanel.style.flex = '';
                rightPanel.style.flex = '';
            });
        }

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            // set up view selector
            viewSelect.addEventListener('change', function() {
                setView(this.value);
            });

            // buttons
            document.getElementById('expandAllBtn').addEventListener('click', expandAll);
            document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);
            document.getElementById('resetViewBtn').addEventListener('click', resetView);

            // splitter
            initSplitter();

            // initial view: tree
            currentView = 'tree';
            viewSelect.value = 'tree';
            // select root? We'll show root details, but not highlight (root not clickable as node)
            // We'll select the root as a default selection so details show.
            selectedNode = questData;
            selectedNodeName = questData.name;
            renderDetails(questData);
            renderView('tree');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
